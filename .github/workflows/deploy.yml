name: Deploy Backend

on:
  push:
    branches:
      - master   # or main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/restaurant_app/zenzio_backend
            git pull origin master
            npm install
            npm run build
            pm2 restart backend || pm2 start dist/main.js --name backend