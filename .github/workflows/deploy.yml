name: Deploy Backend

on:
  push:
    branches:
      - master   # change to main if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e   # stop on first error

            echo "Going to project folder"
            cd /home/ubuntu/restaurant_app/zenzio_backend

            echo "Pull latest code"
            git fetch origin
            git reset --hard origin/master

            echo "Install dependencies"
            npm ci

            echo "Build project"
            npm run build

            echo "Restart app"
            pm2 restart backend --update-env || pm2 start dist/main.js --name backend --update-env

            echo "Save PM2 state"
            pm2 save

            APP_PORT=$(awk -F= '/^PORT=/{print $2}' .env | tail -n 1)
            APP_PORT=${APP_PORT:-4000}

            echo "Health check on port ${APP_PORT}"
            for i in $(seq 1 20); do
              if curl -fsS "http://localhost:${APP_PORT}/" >/dev/null; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for app to boot... attempt ${i}/20"
              sleep 3
            done

            echo "Health check failed after waiting for startup"
            pm2 logs backend --lines 100 --nostream || true
            exit 1
